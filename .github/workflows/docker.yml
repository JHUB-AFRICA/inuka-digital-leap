name: Build and Push Angular App to Docker Hub

on:
  push:
    branches:
      - main # Triggers the pipeline when code is pushed to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the latest code down into the GitHub runner environment
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the Docker Buildx tool for advanced caching features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to your Docker Hub account securely using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Extract metadata (tags, labels) based on git semantic versions or commit SHAs
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mysticscallywag2439/idl-app
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Step 5: Build the image from your Dockerfile and push it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # Enables layer caching to make subsequent builds incredibly fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
